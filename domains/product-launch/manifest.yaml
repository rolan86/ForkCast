name: product-launch
version: "1.0"
description: >
  Product launch and startup validation. Simulates how buyers, competitors,
  investors, analysts, early adopters, partners, and media reviewers react
  to a product announcement.
language: en
sim_engine: claude
platforms:
  - twitter
prompts:
  ontology: prompts/ontology.md
  persona: prompts/persona.md
  persona_batch: prompts/persona_batch.md
  report_guidelines: prompts/report_guidelines.md
  config_generation: prompts/config_gen.md
  agent_system: prompts/agent_system.md
ontology:
  hints: ontology/hints.yaml
  max_entity_types: 10
  required_fallbacks:
    - Person
    - Organization
